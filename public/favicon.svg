<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond -->
  <circle cx="32" cy="32" r="30" fill="#FDF4FB"/>

  <!-- Clippath pour forcer tout dans le cercle -->
  <clipPath id="circleClip">
    <circle cx="32" cy="32" r="29"/>
  </clipPath>

  <g clip-path="url(#circleClip)">
    <!-- Oreille gauche -->
    <ellipse cx="22" cy="21" rx="6" ry="13" fill="white" stroke="#9B5E8A" stroke-width="2"/>
    <ellipse cx="22" cy="22" rx="2.5" ry="8" fill="#E8A0C8"/>

    <!-- Oreille droite -->
    <ellipse cx="42" cy="21" rx="6" ry="13" fill="white" stroke="#9B5E8A" stroke-width="2"/>
    <ellipse cx="42" cy="22" rx="2.5" ry="8" fill="#E8A0C8"/>

    <!-- Tête -->
    <circle cx="32" cy="35" r="13" fill="white" stroke="#9B5E8A" stroke-width="2"/>

    <!-- Yeux -->
    <circle cx="27.5" cy="34" r="1.8" fill="#3D2A1E"/>
    <circle cx="36.5" cy="34" r="1.8" fill="#3D2A1E"/>
    <circle cx="28.2" cy="33.3" r="0.6" fill="white"/>
    <circle cx="37.2" cy="33.3" r="0.6" fill="white"/>

    <!-- Joues -->
    <ellipse cx="25" cy="37.5" rx="3" ry="2" fill="#F2C0DC" opacity="0.5"/>
    <ellipse cx="39" cy="37.5" rx="3" ry="2" fill="#F2C0DC" opacity="0.5"/>

    <!-- Nez -->
    <circle cx="32" cy="37.5" r="1.3" fill="#E8A0C8"/>

    <!-- Bouche -->
    <path d="M30 39.5 Q32 41.5 34 39.5" fill="none" stroke="#9B5E8A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Pelote mauve -->
    <circle cx="32" cy="53" r="8" fill="#C9A0DC" stroke="#9B5E8A" stroke-width="1.5"/>
    <path d="M25 53 C28 47 36 59 39 53 M25.5 49 C30 55 34 45 38.5 51 M25.5 57 C30 51 34 61 38.5 55" fill="none" stroke="#9B5E8A" stroke-width="1"/>

    <!-- Crochet -->
    <path d="M39 44 L47 31 Q48.5 29 46.5 28" fill="none" stroke="#9B5E8A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
